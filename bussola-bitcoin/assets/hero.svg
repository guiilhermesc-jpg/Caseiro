<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Bússola — bitcoin soberano">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="hsheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" fill="url(#hg)"/>
  <rect width="1200" height="170" fill="url(#hsheen)"/>
  <!-- formas decorativas -->
  <circle cx="1080" cy="40" r="210" fill="#ffffff" opacity=".10"/>
  <circle cx="150" cy="320" r="180" fill="#ffffff" opacity=".08"/>
  <circle cx="940" cy="250" r="80" fill="#ffffff" opacity=".07"/>
  <!-- sparkles -->
  <g fill="#ffffff" opacity=".7">
    <path d="M120 70 l6 14 14 6 -14 6 -6 14 -6 -14 -14 -6 14 -6 z"/>
    <path d="M250 210 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z" opacity=".8"/>
    <path d="M620 60 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z" opacity=".6"/>
  </g>
  <!-- bússola -->
  <g transform="translate(1000,160)">
    <circle r="96" fill="none" stroke="#ffffff" stroke-opacity=".30" stroke-width="9"/>
    <circle r="96" fill="none" stroke="#ffffff" stroke-opacity=".85" stroke-width="5" stroke-dasharray="2 26" stroke-linecap="round"/>
    <polygon points="0,-78 22,0 0,-12 -22,0" fill="#ffffff"/>
    <polygon points="0,78 -22,0 0,12 22,0" fill="#ffffff" fill-opacity=".5"/>
    <circle r="16" fill="#6d28d9" stroke="#ffffff" stroke-width="5"/>
  </g>
  <!-- ₿ watermark -->
  <text x="70" y="250" font-family="Arial, sans-serif" font-size="240" font-weight="bold"
        fill="#ffffff" opacity=".10">₿</text>
</svg>

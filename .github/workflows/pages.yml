name: Deploy Bússola (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'bussola-bitcoin/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bussola-bitcoin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bussola-bitcoin/package-lock.json
      - name: Instalar dependências
        run: npm ci
      - name: Build do app (bundle + www)
        run: npm run build && npm run build:www
      # Requer Pages ativado uma vez em Settings → Pages → Source: "GitHub Actions".
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Empacotar o app (www como raiz do site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: bussola-bitcoin/www
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

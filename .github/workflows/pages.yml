name: Deploy Bússola (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'bussola-bitcoin/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Pages (ativa automaticamente)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Empacotar o app (pasta bussola-bitcoin como raiz do site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: bussola-bitcoin
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Projeto Sirene</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Venor" />
    <style>
      html, body {
        margin: 0; padding: 0; height: 100%;
        overflow: hidden; background: #1a2230;
        font-family: Arial, Helvetica, sans-serif;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #game { width: 100vw; height: 100vh; }
      #game canvas { display: block; }
      * { -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main3d.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(async () => {
              if (!('caches' in window)) return;
              const cache = await caches.open('venor-rv82-offline-v1');
              const urls = new Set(['/', '/index.html', '/baixar.html', '/manifest.webmanifest', '/icon.svg']);
              performance.getEntriesByType('resource')
                .map((entry) => entry.name)
                .filter((url) => url.startsWith(location.origin))
                .forEach((url) => urls.add(new URL(url).pathname));
              await Promise.all([...urls].map((url) => cache.add(url).catch(() => {})));
            })
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
